<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Moderna</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculadora">

    <div class="pantalla">
      <input type="text" id="resultado" disabled>
    </div>

    <div class="botones">

      <button class="btn rojo" onclick="limpiar()">AC</button>
      <button class="btn gris" onclick="agregar('%')">%</button>
      <button class="btn gris" onclick="agregar('*')">×</button>
      <button class="btn gris" onclick="agregar('/')">÷</button>

      <button class="btn numero" onclick="agregar('7')">7</button>
      <button class="btn numero" onclick="agregar('8')">8</button>
      <button class="btn numero" onclick="agregar('9')">9</button>
      <button class="btn gris" onclick="agregar('-')">−</button>

      <button class="btn numero" onclick="agregar('4')">4</button>
      <button class="btn numero" onclick="agregar('5')">5</button>
      <button class="btn numero" onclick="agregar('6')">6</button>
      <button class="btn gris" onclick="agregar('+')">+</button>

      <button class="btn numero" onclick="agregar('1')">1</button>
      <button class="btn numero" onclick="agregar('2')">2</button>
      <button class="btn numero" onclick="agregar('3')">3</button>

      <button class="btn igual" onclick="calcular()">=</button>

      <button class="btn numero cero" onclick="agregar('0')">0</button>
      <button class="btn numero" onclick="agregar('.')">.</button>
      <button class="btn numero" onclick="cambiarSigno()">+/-</button>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
